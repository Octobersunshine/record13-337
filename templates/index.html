<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片文字水印服务</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            color: #fff;
            text-align: center;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .subtitle {
            color: rgba(255,255,255,0.85);
            text-align: center;
            margin-bottom: 40px;
            font-size: 15px;
        }
        .main-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        @media (max-width: 768px) {
            .main-card { grid-template-columns: 1fr; }
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"], input[type="number"], input[type="color"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }
        input[type="text"]:focus, input[type="number"]:focus, input[type="color"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        input[type="range"] {
            width: 100%;
        }
        .range-value {
            display: inline-block;
            font-weight: 600;
            color: #667eea;
            margin-left: 10px;
        }
        input[type="file"] {
            display: none;
        }
        .file-upload {
            display: block;
            border: 3px dashed #d0d0d0;
            border-radius: 12px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-upload:hover, .file-upload.dragover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .file-upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .file-upload-text {
            color: #666;
            font-size: 15px;
        }
        .file-upload-hint {
            color: #999;
            font-size: 13px;
            margin-top: 6px;
        }
        .position-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .position-btn {
            padding: 14px 8px;
            border: 2px solid #e8e8e8;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            transition: all 0.2s;
        }
        .position-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        .position-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-color: transparent;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .color-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        input[type="color"] {
            width: 60px;
            height: 44px;
            padding: 4px;
            cursor: pointer;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.5);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .preview-area {
            min-height: 400px;
            background: #f7f8fc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border: 2px dashed #e0e0e0;
            overflow: hidden;
            position: relative;
        }
        .preview-area img {
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
        }
        .preview-placeholder {
            text-align: center;
            color: #aaa;
        }
        .preview-placeholder-icon {
            font-size: 64px;
            margin-bottom: 12px;
        }
        .btn-download {
            display: none;
            margin-top: 16px;
            padding: 12px 24px;
            background: #10b981;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .btn-download:hover { background: #059669; }
        .btn-download.show { display: inline-block; }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .error-msg.show { display: block; }
        .loading {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10;
        }
        .loading.show { display: flex; }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e8e8e8;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .file-name {
            margin-top: 10px;
            color: #667eea;
            font-size: 13px;
            font-weight: 600;
        }
        .switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
        }
        .switch-label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        .switch-desc {
            color: #888;
            font-size: 12px;
            margin-top: 2px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        input:checked + .slider:before {
            transform: translateX(22px);
        }
        .divider {
            height: 1px;
            background: #eee;
            margin: 16px 0;
        }
        .section-title {
            font-size: 13px;
            color: #888;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="color"]:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        input[type="text"]:disabled {
            background: #f5f5f5;
            opacity: 0.5;
            cursor: not-allowed;
        }
</head>
<body>
    <div class="container">
        <h1>图片文字水印服务</h1>
        <p class="subtitle">上传图片，添加自定义文字水印 · 智能背景适配 · 九宫格位置配置</p>
        
        <div class="main-card">
            <div class="form-section">
                <form id="watermarkForm">
                    <div class="form-group">
                        <label>选择图片</label>
                        <label class="file-upload" id="fileUpload">
                            <input type="file" id="imageInput" name="image" accept="image/png,image/jpeg,image/jpg,image/bmp,image/gif,image/webp">
                            <div class="file-upload-icon">📷</div>
                            <div class="file-upload-text">点击或拖拽图片到此处</div>
                            <div class="file-upload-hint">支持 PNG、JPG、BMP、GIF、WEBP</div>
                            <div class="file-name" id="fileName"></div>
                        </label>
                    </div>

                    <div class="form-group">
                        <label>水印文字</label>
                        <input type="text" id="textInput" name="text" placeholder="请输入水印文字，如：Copyright 2026" value="© My Watermark">
                    </div>

                    <div class="form-group">
                        <label>水印位置</label>
                        <div class="position-grid" id="positionGrid">
                            <button type="button" class="position-btn" data-value="top-left">左上</button>
                            <button type="button" class="position-btn" data-value="top-center">上中</button>
                            <button type="button" class="position-btn" data-value="top-right">右上</button>
                            <button type="button" class="position-btn" data-value="center-left">左中</button>
                            <button type="button" class="position-btn active" data-value="center">居中</button>
                            <button type="button" class="position-btn" data-value="center-right">右中</button>
                            <button type="button" class="position-btn" data-value="bottom-left">左下</button>
                            <button type="button" class="position-btn" data-value="bottom-center">下中</button>
                            <button type="button" class="position-btn" data-value="bottom-right">右下</button>
                        </div>
                        <input type="hidden" id="positionInput" name="position" value="center">
                    </div>

                    <div class="row-2">
                        <div class="form-group">
                            <label>字体大小 <span class="range-value" id="fontSizeValue">36</span></label>
                            <input type="range" id="fontSizeInput" name="font_size" min="10" max="200" value="36">
                        </div>
                        <div class="form-group">
                            <label>透明度 <span class="range-value" id="opacityValue">150</span></label>
                            <input type="range" id="opacityInput" name="opacity" min="0" max="255" value="150">
                        </div>
                    </div>

                    <div class="row-2">
                        <div class="form-group">
                            <label>边距 <span class="range-value" id="marginValue">20</span></label>
                            <input type="range" id="marginInput" name="margin" min="0" max="200" value="20">
                        </div>
                        <div class="form-group">
                            <label>旋转角度 <span class="range-value" id="angleValue">0</span>°</label>
                            <input type="range" id="angleInput" name="angle" min="-180" max="180" value="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>文字颜色</label>
                        <div class="color-row">
                            <input type="color" id="colorInput" name="color" value="#FFFFFF">
                            <input type="text" id="colorText" value="#FFFFFF" style="flex:1">
                        </div>
                    </div>

                    <div class="divider"></div>
                    <div class="section-title">智能选项</div>

                    <div class="switch-row">
                        <div>
                            <div class="switch-label">自动适配颜色</div>
                            <div class="switch-desc">根据背景亮度自动选择黑色或白色</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="autoColorInput" name="auto_color" checked>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="switch-row">
                        <div>
                            <div class="switch-label">文字描边</div>
                            <div class="switch-desc">添加文字描边增强可见性</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="strokeInput" name="stroke" checked>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="form-group" id="strokeWidthGroup">
                        <label>描边粗细 <span class="range-value" id="strokeWidthValue">2</span>px</label>
                        <input type="range" id="strokeWidthInput" name="stroke_width" min="0" max="5" value="2">
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">生成水印图片</button>
                    <div class="error-msg" id="errorMsg"></div>
                </form>
            </div>

            <div class="preview-section">
                <div class="preview-area" id="previewArea">
                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <div>处理中...</div>
                    </div>
                    <div class="preview-placeholder" id="previewPlaceholder">
                        <div class="preview-placeholder-icon">🖼️</div>
                        <div>上传图片后在此预览</div>
                    </div>
                    <img id="previewImg" style="display:none" alt="预览">
                </div>
                <a class="btn-download" id="downloadBtn" href="#">下载水印图片</a>
            </div>
        </div>
    </div>

    <script>
        let currentBlobUrl = null;

        const imageInput = document.getElementById('imageInput');
        const fileUpload = document.getElementById('fileUpload');
        const fileName = document.getElementById('fileName');
        const previewImg = document.getElementById('previewImg');
        const previewPlaceholder = document.getElementById('previewPlaceholder');
        const loading = document.getElementById('loading');
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.getElementById('submitBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }
        function hideError() { errorMsg.classList.remove('show'); }

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileName.textContent = file.name;
                const url = URL.createObjectURL(file);
                previewImg.src = url;
                previewImg.style.display = 'block';
                previewPlaceholder.style.display = 'none';
            }
        });

        fileUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUpload.classList.add('dragover');
        });
        fileUpload.addEventListener('dragleave', () => {
            fileUpload.classList.remove('dragover');
        });
        fileUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUpload.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                imageInput.files = e.dataTransfer.files;
                imageInput.dispatchEvent(new Event('change'));
            }
        });

        const positionGrid = document.getElementById('positionGrid');
        const positionInput = document.getElementById('positionInput');
        positionGrid.addEventListener('click', (e) => {
            const btn = e.target.closest('.position-btn');
            if (btn) {
                positionGrid.querySelectorAll('.position-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                positionInput.value = btn.dataset.value;
            }
        });

        const rangeInputs = [
            { input: document.getElementById('fontSizeInput'), display: document.getElementById('fontSizeValue') },
            { input: document.getElementById('opacityInput'), display: document.getElementById('opacityValue') },
            { input: document.getElementById('marginInput'), display: document.getElementById('marginValue') },
            { input: document.getElementById('angleInput'), display: document.getElementById('angleValue') },
        ];
        rangeInputs.forEach(({input, display}) => {
            input.addEventListener('input', () => display.textContent = input.value);
        });

        const colorInput = document.getElementById('colorInput');
        const colorText = document.getElementById('colorText');
        colorInput.addEventListener('input', () => colorText.value = colorInput.value.toUpperCase());
        colorText.addEventListener('input', () => {
            if (/^#[0-9A-Fa-f]{6}$/.test(colorText.value)) {
                colorInput.value = colorText.value;
            }
        });

        const autoColorInput = document.getElementById('autoColorInput');
        const strokeInput = document.getElementById('strokeInput');
        const strokeWidthGroup = document.getElementById('strokeWidthGroup');
        const strokeWidthInput = document.getElementById('strokeWidthInput');
        const strokeWidthValue = document.getElementById('strokeWidthValue');

        autoColorInput.addEventListener('change', () => {
            const isDisabled = autoColorInput.checked;
            colorInput.disabled = isDisabled;
            colorText.disabled = isDisabled;
        });

        strokeInput.addEventListener('change', () => {
            strokeWidthGroup.style.display = strokeInput.checked ? 'block' : 'none';
        });

        strokeWidthInput.addEventListener('input', () => {
            strokeWidthValue.textContent = strokeWidthInput.value;
        });

        document.getElementById('watermarkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            if (!imageInput.files[0]) { showError('请先上传图片'); return; }
            if (!document.getElementById('textInput').value.trim()) { showError('请输入水印文字'); return; }

            const formData = new FormData(e.target);
            formData.set('auto_color', autoColorInput.checked ? 'true' : 'false');
            formData.set('stroke', strokeInput.checked ? 'true' : 'false');
            loading.classList.add('show');
            submitBtn.disabled = true;
            downloadBtn.classList.remove('show');

            try {
                const res = await fetch('/api/watermark', { method: 'POST', body: formData });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({error: '请求失败'}));
                    throw new Error(err.error || `HTTP ${res.status}`);
                }
                const blob = await res.blob();
                if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
                currentBlobUrl = URL.createObjectURL(blob);
                previewImg.src = currentBlobUrl;
                previewImg.style.display = 'block';
                previewPlaceholder.style.display = 'none';

                const contentDisposition = res.headers.get('Content-Disposition');
                let dlName = 'watermarked.png';
                if (contentDisposition) {
                    const match = contentDisposition.match(/filename="?([^"]+)"?/);
                    if (match) dlName = match[1];
                }
                downloadBtn.href = currentBlobUrl;
                downloadBtn.download = dlName;
                downloadBtn.classList.add('show');
            } catch (err) {
                showError(err.message || '处理失败，请重试');
            } finally {
                loading.classList.remove('show');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
